<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>События и Контент | VIBE TRAVEL 03</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="src/css/main.css">
    <link rel="stylesheet" href="src/css/components.css">
    <script src="data/config.js"></script>
</head>
<body>
    <header class="header">
        <div class="container header__inner">
            <a href="index.html" class="logo">VIBE TRAVEL 03</a>
            <nav class="nav"><ul class="nav__list"><li><a href="routes.html">Маршруты</a></li></ul></nav>
        </div>
    </header>

    <main class="container" style="padding-top: 100px;">
        <h1 class="section-title">Афиша 2026</h1>
        <div id="eventsContainer" class="events-list">
            <!-- Events -->
        </div>

        <h1 class="section-title" style="margin-top: 4rem;">Видео-вайб</h1>
        <div class="video-wrapper wave-effect">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0" frameborder="0" allowfullscreen></iframe>
        </div>
        <div class="video-wrapper wave-effect">
            <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?controls=0" frameborder="0" allowfullscreen></iframe>
        </div>
    </main>

    <script>
        fetch('data/events.json')
            .then(r => r.json())
            .then(events => {
                const container = document.getElementById('eventsContainer');
                events.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = 'event-card';
                    div.innerHTML = `
                        <div class="event-date">${ev.date.split(' ')[0]}</div>
                        <div>
                            <h3>${ev.title}</h3>
                            <p>${ev.location} • ${ev.description}</p>
                        </div>
                    `;
                    container.appendChild(div);
                });
            });
    </script>
</body>
</html>
